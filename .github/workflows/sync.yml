name: sync

on:
  schedule:
    - cron: '*/15 * * * *'   # 15分毎
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    concurrency:
      group: sync
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run sync
        env:
          BOARD_API_KEY: ${{ secrets.BOARD_API_KEY }}
          BOARD_API_TOKEN: ${{ secrets.BOARD_API_TOKEN }}
          REPSONA_SPACE_ID: ${{ secrets.REPSONA_SPACE_ID }}
          REPSONA_API_TOKEN: ${{ secrets.REPSONA_API_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          STALE_DAYS: '14'
        run: python run.py

      - name: Commit DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.db
          git diff --cached --quiet || git commit -m "sync data [skip ci]"
          git push
